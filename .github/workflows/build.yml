name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: HyperCapslock
  SCHEME: HyperCapslock
  # Run third-party JS actions on Node 24 (Node 20 is deprecated by GitHub).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Always: compile + unit tests (validates PRs and main) ──
      - name: Build & test (unsigned)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          xcodebuild -project "$APP_NAME.xcodeproj" -scheme "$SCHEME" \
            -configuration Debug -destination 'platform=macOS' \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO test

      # ── Tagged release: signed, notarized, DMG, Sparkle appcast ──
      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
          rm -f certificate.p12

      - name: Build universal Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild -project "$APP_NAME.xcodeproj" -scheme "$SCHEME" \
            -configuration Release -destination 'platform=macOS' \
            -derivedDataPath build/dd \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO build
          echo "APP_PATH=build/dd/Build/Products/Release/$APP_NAME.app" >> $GITHUB_ENV

      - name: Code sign (inside-out)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ENT="HyperCapslock/Resources/HyperCapslock.entitlements"
          # Sign embedded Sparkle framework + its XPC services / helper apps deepest-first.
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -type f | while read -r f; do
              file "$f" | grep -q "Mach-O" && codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$f" || true
            done
            find "$APP_PATH/Contents/Frameworks" -name "*.xpc" -type d | while read -r b; do
              codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$b"; done
            find "$APP_PATH/Contents/Frameworks" -name "*.app" -type d | while read -r b; do
              codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$b"; done
            find "$APP_PATH/Contents/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) | while read -r b; do
              codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$b"; done
          fi
          codesign --force --options runtime --timestamp --entitlements "$ENT" --sign "$SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize & staple
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$APP_PATH" notarize.zip
          xcrun notarytool submit notarize.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          create-dmg \
            --volname "$APP_NAME" --window-pos 200 120 --window-size 600 400 \
            --icon-size 100 --icon "$APP_NAME.app" 150 190 \
            --hide-extension "$APP_NAME.app" --app-drop-link 450 190 \
            "$APP_NAME.dmg" "$APP_PATH" || true
          test -f "$APP_NAME.dmg"

      - name: Sign update & generate appcast (Sparkle)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGN_UPDATE=$(find build/dd/SourcePackages/artifacts -name sign_update -type f | head -1)
          printf '%s' "$SPARKLE_EDDSA_KEY" > eddsa_priv.key
          SIG_LINE=$("$SIGN_UPDATE" "$APP_NAME.dmg" --ed-key-file eddsa_priv.key)   # → sparkle:edSignature="…" length="…"
          rm -f eddsa_priv.key
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${APP_NAME}.dmg"
          cat > appcast.xml <<XML
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>HyperCapslock</title>
              <item>
                <title>${VERSION}</title>
                <pubDate>$(date -u +"%a, %d %b %Y %H:%M:%S +0000")</pubDate>
                <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}" ${SIG_LINE} type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          XML
          # latest.json: the manifest the Homebrew tap's generator reads
          # (same shape as the other DMG apps in the tap) to update the cask.
          cat > latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-aarch64": { "signature": "", "url": "${DMG_URL}" },
              "darwin-x86_64": { "signature": "", "url": "${DMG_URL}" }
            }
          }
          JSON

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_NAME }}.dmg
            appcast.xml
            latest.json
          name: HyperCapslock ${{ github.ref_name }}
          generate_release_notes: true

      - name: Trigger Apps Gallery Update
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GALLERY_UPDATE_PAT }}
          repository: XueshiQiao/XueshiQiao.github.io
          event-type: app_released

      - name: Trigger Homebrew Tap Update
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          repository: XueshiQiao/homebrew_tap
          event-type: update_cask
          client-payload: '{"app_token": "hypercapslock"}'
